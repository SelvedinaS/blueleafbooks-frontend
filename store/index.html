<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=1">
  <title>BlueLeafBooks</title>
  <meta name="description" content="Browse and buy digital books by genre.">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header>
  <nav>
    <a href="/" class="logo">BlueLeafBooks</a>
    <button class="menu-btn">☰</button>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/store">Store</a></li>
      <li><a href="/cart">Cart</a></li>
      <li><a href="/for-authors">For Authors</a></li>
      <li><a href="/support">Support</a></li>
    </ul>
  </nav>
</header>

<div class="container">

  <section class="section">
    <h2 class="section-title">Featured Picks</h2>
    <div id="curated-books-store" class="books-grid"></div>
  </section>

  <h1 class="section-title">All Books</h1>

  <div class="filters">

    <input type="text" id="search-input" placeholder="Search books..." style="flex:1;">

    <select id="genre-filter">
      <option value="">All Genres</option>
      <option value="Art & Design">Art & Design</option>
      <option value="Biography">Biography</option>
      <option value="Business">Business</option>
      <option value="Children">Children</option>
      <option value="Comics & Graphic Novels">Comics & Graphic Novels</option>
      <option value="Cooking & Food">Cooking & Food</option>
      <option value="Crafts & Hobbies">Crafts & Hobbies</option>
      <option value="Education">Education</option>
      <option value="Entrepreneurship">Entrepreneurship</option>
      <option value="Fantasy">Fantasy</option>
      <option value="Fiction">Fiction</option>
      <option value="Finance">Finance</option>
      <option value="Health & Fitness">Health & Fitness</option>
      <option value="History">History</option>
      <option value="Horror">Horror</option>
      <option value="Humor">Humor</option>
      <option value="Language Learning">Language Learning</option>
      <option value="Lifestyle">Lifestyle</option>
      <option value="Marketing">Marketing</option>
      <option value="Memoir">Memoir</option>
      <option value="Mystery">Mystery</option>
      <option value="Non-Fiction">Non-Fiction</option>
      <option value="Parenting">Parenting</option>
      <option value="Personal Development">Personal Development</option>
      <option value="Philosophy">Philosophy</option>
      <option value="Poetry">Poetry</option>
      <option value="Politics">Politics</option>
      <option value="Productivity">Productivity</option>
      <option value="Psychology">Psychology</option>
      <option value="Relationships">Relationships</option>
      <option value="Religion & Spirituality">Religion & Spirituality</option>
      <option value="Romance">Romance</option>
      <option value="Science">Science</option>
      <option value="Science Fiction">Science Fiction</option>
      <option value="Self-Help">Self-Help</option>
      <option value="Technology">Technology</option>
      <option value="Thriller">Thriller</option>
      <option value="Travel">Travel</option>
      <option value="Writing">Writing</option>
    </select>
    <!-- update -->

    <input type="number" id="min-price" placeholder="Min Price" style="width:120px;">
    <input type="number" id="max-price" placeholder="Max Price" style="width:120px;">

    <select id="sort-by">
      <option value="createdAt">Newest</option>
      <option value="popularity">Popular</option>
      <option value="rating">Top Rated</option>
      <option value="price">Price</option>
    </select>

    <button class="btn btn-primary" onclick="applyFilters()">Apply</button>

  </div>

  <div id="books-container" class="books-grid"></div>

</div>

<script src="/js/api.js?v=3"></script>
<script src="/js/auth.js"></script>
<script src="/js/books.js?v=3"></script>

<script>
function applyFilters() {
  const filters = {
    genre: document.getElementById('genre-filter').value,
    search: document.getElementById('search-input').value,
    minPrice: document.getElementById('min-price').value,
    maxPrice: document.getElementById('max-price').value,
    sortBy: document.getElementById('sort-by').value
  };

  Object.keys(filters).forEach(key => {
    if (!filters[key]) delete filters[key];
  });

  loadBooks(filters);
}

document.addEventListener('DOMContentLoaded', () => {
  loadBooks();

  document.getElementById('search-input').addEventListener('keypress', e => {
    if (e.key === 'Enter') applyFilters();
  });
});
</script>

</body>
</html>
