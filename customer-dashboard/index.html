<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=1">
  <title>My Library – BlueLeafBooks</title>
  <meta name="description" content="Your purchased digital books. Download your PDFs anytime.">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="/" class="logo">BlueLeafBooks</a>
      <button class="menu-btn" aria-label="Open menu" aria-expanded="false">☰</button>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/store">Store</a></li>
        <li><a href="/cart">Cart</a></li>
        <li><a href="/for-authors">For Authors</a></li>
        <li><a href="/support">Support</a></li>
      </ul>
    </nav>
  </header>

  <div class="container">
    <div class="dashboard">
      <div class="dashboard-sidebar">
        <h3>My Account</h3>
        <ul>
          <li><a href="/customer-dashboard" class="active">My Library</a></li>
          <li><a href="/store">Browse Books</a></li>
        </ul>
      </div>

      <div class="dashboard-content">
        <div id="dashboard-content">
          <p class="loading">Loading...</p>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/api.js?v=3"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/dashboard.js"></script>
  <script>
    requireAuth();
    requireRole('customer');

    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.querySelector('.menu-btn');
      const nav = document.querySelector('.nav-links');
      if (btn && nav) {
        btn.addEventListener('click', () => { nav.classList.toggle('open'); btn.setAttribute('aria-expanded', nav.classList.contains('open') ? 'true' : 'false'); });
      }
      const dashBtn = document.querySelector('.dashboard-menu-btn');
      const sidebar = document.querySelector('.dashboard-sidebar');
      if (dashBtn && sidebar) {
        sidebar.id = 'dashboard-sidebar';
        dashBtn.addEventListener('click', () => { const open = sidebar.classList.toggle('is-open'); dashBtn.setAttribute('aria-expanded', open ? 'true' : 'false'); });
      }
      loadCustomerDashboard();
    });
  </script>

  <footer style="background-color: var(--white); border-top: 1px solid var(--border-color); padding: 2rem 0; margin-top: 3rem;">
    <div class="container" style="text-align: center; color: #666;">
      <p>&copy; 2026 BlueLeafBooks. All rights reserved.</p>
      <p style="margin-top: 0.5rem;">
        <a href="/support" style="color: var(--primary-color); text-decoration: none; margin: 0 0.5rem;">Support</a>
        <a href="/privacy" style="color: var(--primary-color); text-decoration: none; margin: 0 0.5rem;">Privacy Policy</a>
        <a href="/refund-policy" style="color: var(--primary-color); text-decoration: none; margin: 0 0.5rem;">Refund Policy</a>
        <a href="/terms" style="color: var(--primary-color); text-decoration: none; margin: 0 0.5rem;">Terms &amp; Conditions</a>
      </p>
    </div>
  </footer>
</body>
</html>
