<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png?v=1">
  <title>Reset Password - BlueLeafBooks</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="index.html" class="logo">BlueLeafBooks</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="store.html">Store</a></li>
        <li><a href="login.html">Login</a></li>
      </ul>
    </nav>
  </header>

  <div class="container">
    <div class="form-container">
      <h2>Set new password</h2>
      <div id="alert-container"></div>
      <div id="no-token-message" style="display: none;">
        <p class="alert alert-error">Invalid or missing reset link. Please request a new one from <a href="forgot-password.html">Forgot password</a>.</p>
      </div>
      <form id="reset-form" style="display: none;">
        <input type="hidden" id="token" name="token">
        <div class="form-group">
          <label for="password">New password</label>
          <input type="password" id="password" name="password" required minlength="6" placeholder="At least 6 characters">
        </div>
        <div class="form-group">
          <label for="password2">Confirm new password</label>
          <input type="password" id="password2" name="password2" required minlength="6" placeholder="Repeat password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;" id="submit-btn">Reset password</button>
      </form>
      <p style="margin-top: 1rem; text-align: center;">
        <a href="login.html" style="color: var(--primary-color);">Back to login</a>
      </p>
    </div>
  </div>

  <script src="./js/api.js?v=3"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const alertContainer = document.getElementById('alert-container');
    const noTokenMsg = document.getElementById('no-token-message');
    const form = document.getElementById('reset-form');

    if (!token) {
      noTokenMsg.style.display = 'block';
    } else {
      document.getElementById('token').value = token;
      form.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertContainer.innerHTML = '';
      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;
      if (password.length < 6) {
        alertContainer.innerHTML = '<div class="alert alert-error">Password must be at least 6 characters.</div>';
        return;
      }
      if (password !== password2) {
        alertContainer.innerHTML = '<div class="alert alert-error">Passwords do not match.</div>';
        return;
      }
      const submitBtn = document.getElementById('submit-btn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Resetting...';
      try {
        const res = await fetch(`${API_BASE_URL}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          throw new Error(data.message || 'Reset failed');
        }
        alertContainer.innerHTML = '<div class="alert alert-info">Password has been reset. You can now <a href="login.html">log in</a> with your new password.</div>';
        form.reset();
      } catch (err) {
        alertContainer.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      }
      submitBtn.disabled = false;
      submitBtn.textContent = 'Reset password';
    });
  </script>
</body>
</html>
