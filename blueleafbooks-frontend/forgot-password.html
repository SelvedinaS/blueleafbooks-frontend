<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png?v=1">
  <title>Forgot Password - BlueLeafBooks</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="/index" class="logo">BlueLeafBooks</a>
      <ul class="nav-links">
        <li><a href="/index">Home</a></li>
        <li><a href="/store">Store</a></li>
        <li><a href="/login">Login</a></li>
      </ul>
    </nav>
  </header>

  <div class="container">
    <div class="form-container">
      <h2>Forgot your password?</h2>
      <p style="color: #666; margin-bottom: 1rem;">Password reset is currently handled manually by BlueLeafBooks support.</p>
      <p style="color: #666; margin-bottom: 1.5rem;">Enter your account email below and we will show you how to contact support for a manual password reset.</p>
      <div id="alert-container"></div>
      <form id="forgot-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="your@email.com">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;" id="submit-btn">Get support instructions</button>
      </form>
      <p style="margin-top: 1rem; text-align: center;">
        <a href="/login" style="color: var(--primary-color);">Back to login</a>
      </p>
    </div>
  </div>

  <script src="./js/api.js?v=3"></script>
  <script>
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alertContainer = document.getElementById('alert-container');
      const submitBtn = document.getElementById('submit-btn');
      alertContainer.innerHTML = '';
      const email = document.getElementById('email').value.trim();
      if (!email) {
        alertContainer.innerHTML = '<div class="alert alert-error">Email is required.</div>';
        return;
      }
      submitBtn.disabled = true;
      submitBtn.textContent = 'Please wait...';
      try {
        const res = await fetch(`${API_BASE_URL}/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          throw new Error(data.message || 'Request failed');
        }
        alertContainer.innerHTML = '<div class="alert alert-info">Please contact <strong>blueleafbooks@hotmail.com</strong> and include your account email address. Password resets are handled manually by BlueLeafBooks support.</div>';
        document.getElementById('forgot-form').reset();
      } catch (err) {
        alertContainer.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      }
      submitBtn.disabled = false;
      submitBtn.textContent = 'Get support instructions';
    });
  </script>
</body>
</html>
