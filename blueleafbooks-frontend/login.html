<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png?v=1">
  <title>Log in – BlueLeafBooks</title>
  <meta name="description" content="Log in to your BlueLeafBooks account to buy books or manage your author dashboard.">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="/index" class="logo">BlueLeafBooks</a>
      <button class="menu-btn" aria-label="Open menu" aria-expanded="false">☰</button>
      <ul class="nav-links">
        <li><a href="/index">Home</a></li>
        <li><a href="/store">Store</a></li>
        <li><a href="/cart">Cart</a></li>
        <li><a href="/for-authors">For Authors</a></li>
        <li><a href="/support">Support</a></li>
      </ul>
    </nav>
  </header>

  <div class="container">
    <div class="form-container">
      <h2>Login</h2>
      <div id="alert-container"></div>
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
      </form>
      <p style="margin-top: 1rem; text-align: center;">
        <a href="/forgot-password" style="color: var(--primary-color); font-weight: 500;">Forgot your password?</a>
      </p>
      <p style="margin-top: 0.75rem; text-align: center;">
        Don't have an account? <a href="/register">Register here</a>
      </p>
    </div>
  </div>

  <script src="./js/api.js?v=3"></script>
  <script src="./js/auth.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const alertContainer = document.getElementById('alert-container');
      alertContainer.innerHTML = '';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const response = await authAPI.login({ email, password });

        setAuthToken(response.token);
        setCurrentUser(response.user);

        // Redirect based on role
        if (response.user.role === 'customer') {
          window.location.href = 'customer-dashboard.html';
        } else if (response.user.role === 'author') {
          window.location.href = 'author-dashboard.html';
        } else if (response.user.role === 'admin') {
          window.location.href = 'admin-dashboard.html';
        } else {
          window.location.href = 'index.html';
        }
      } catch (error) {
        alertContainer.innerHTML = `<div class="alert alert-error">${error.message}</div>`;
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.querySelector('.menu-btn');
      const nav = document.querySelector('.nav-links');
      if (btn && nav) {
        btn.addEventListener('click', () => {
          nav.classList.toggle('open');
          btn.setAttribute('aria-expanded', nav.classList.contains('open') ? 'true' : 'false');
        });
      }
    });
  </script>

  <footer style="background-color: var(--white); border-top: 1px solid var(--border-color); padding: 2rem 0; margin-top: 3rem;">
    <div class="container" style="text-align: center; color: #666;">
      <p>&copy; 2026 BlueLeafBooks. All rights reserved.</p>
      <p style="margin-top: 0.5rem;">
        <a href="/support" style="color: var(--primary-color); text-decoration: none; margin: 0 0.5rem;">Support</a>
        <a href="/privacy" style="color: var(--primary-color); text-decoration: none; margin: 0 0.5rem;">Privacy Policy</a>
        <a href="/refund-policy" style="color: var(--primary-color); text-decoration: none; margin: 0 0.5rem;">Refund Policy</a>
        <a href="/terms" style="color: var(--primary-color); text-decoration: none; margin: 0 0.5rem;">Terms & Conditions</a>
      </p>
    </div>
  </footer>
</body>
</html>
