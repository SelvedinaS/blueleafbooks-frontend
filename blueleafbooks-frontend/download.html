<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png?v=1" />
  <title>Thank You - BlueLeafBooks</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header>
    <nav>
      <a href="/index" class="logo">BlueLeafBooks</a>
      <ul class="nav-links">
        <li><a href="/index">Home</a></li>
        <li><a href="/store">Store</a></li>
        <li><a href="/customer-dashboard">My Library</a></li>
      </ul>
    </nav>
  </header>

  <div class="container" style="margin-top: 3rem; text-align: center; max-width: 600px;">
    <h1 style="color: var(--primary-color);">Thank you for your purchase!</h1>
    <p style="font-size: 1.1rem; margin: 1rem 0;">Your download will start automatically.</p>

    <p style="margin: 1rem 0;">
      <a id="manual-link" href="#" class="btn btn-primary" style="display: inline-block; margin-top: 1rem;">
        Download Book (PDF)
      </a>
    </p>

    <p id="download-status" style="margin-top: 1rem; color: #666;"></p>

    <p style="margin-top: 2rem;">
      <a href="/customer-dashboard" style="color: var(--primary-color);">View in My Library</a>
    </p>
  </div>

  <script src="./js/api.js?v=3"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/books.js?v=3"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const bookId = urlParams.get("id");

    function escapeFileName(name) {
      return String(name || "book").replace(/[^a-z0-9]/gi, "_");
    }

    async function downloadProtectedPdf() {
      const token = getAuthToken();
      if (!token) {
        throw new Error('Please login to download your purchase.');
      }

      const response = await fetch(`${API_BASE_URL}/books/${bookId}/download`, {
        method: 'GET',
        headers: {
          Authorization: `Bearer ${token}`
        }
      });

      if (!response.ok) {
        let message = 'Download failed.';
        try {
          const data = await response.json();
          message = data.message || message;
        } catch (_) {}
        throw new Error(message);
      }

      return response.blob();
    }

    async function startDownload() {
      const container = document.querySelector('.container');
      const statusEl = document.getElementById('download-status');
      const manualLink = document.getElementById("manual-link");

      if (!bookId) {
        container.innerHTML = '<p class="alert alert-error">Book ID not provided.</p>';
        return;
      }

      if (!isAuthenticated()) {
        alert('Please login to download your purchase.');
        window.location.href = '/login';
        return;
      }

      try {
        statusEl.textContent = 'Preparing your download...';
        const book = await booksAPI.getById(bookId);
        const fileName = `${escapeFileName(book?.title || 'book')}.pdf`;
        const blob = await downloadProtectedPdf();
        const downloadUrl = URL.createObjectURL(blob);

        manualLink.href = downloadUrl;
        manualLink.setAttribute('download', fileName);

        const a = document.createElement('a');
        a.href = downloadUrl;
        a.setAttribute('download', fileName);
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        statusEl.textContent = 'If your download did not start, use the button above.';
      } catch (err) {
        console.error('Download error:', err);
        statusEl.textContent = '';
        container.innerHTML = `<p class="alert alert-error">${err.message || 'Error downloading book. Please try again or contact support.'}</p>`;
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const manualLink = document.getElementById('manual-link');
      if (manualLink) {
        manualLink.addEventListener('click', async (e) => {
          if (manualLink.getAttribute('href') === '#') {
            e.preventDefault();
            await startDownload();
          }
        });
      }
      startDownload();
    });
  </script>
</body>
</html>
